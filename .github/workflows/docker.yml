# .github/workflows/docker.yml
name: Docker Build, Test & Push
on:
  workflow_call:
    inputs:
      image-name:
        type: string
        default: nexacloud
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ github.sha }} ./ressources

      - name: Run
        run: docker run -d -p 8080:8000 --name ${{ inputs.image-name }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ github.sha }}

      - name: Vérifications
        run: |
          sleep 5
          curl --fail http://localhost:8080/health
          curl --fail http://localhost:8080/logs/summary

      - name: Stop
        run: docker stop ${{ inputs.image-name }}

      - name: Push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ github.sha }}
